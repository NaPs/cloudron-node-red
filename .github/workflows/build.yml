name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        if: github.event_name != 'pull_request'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Cloudron CLI
        run: npm install -g cloudron

      - name: Update CloudronVersions.json and create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          NODERED_VERSION="$(sed -n 's/^ARG NODERED_VERSION=//p' Dockerfile)"
          IMAGE="ghcr.io/${GITHUB_REPOSITORY,,}:${VERSION}"

          # release notes / changelog: commit titles since the previous version tag
          PREV_TAG="$(git describe --tags --abbrev=0 "${GITHUB_REF_NAME}^" 2>/dev/null || true)"
          if [ -n "$PREV_TAG" ]; then
            CHANGES="$(git log --pretty='* %s' "${PREV_TAG}..${GITHUB_REF_NAME}")"
          else
            CHANGES="$(git log --pretty='* %s' "${GITHUB_REF_NAME}")"
          fi
          [ -n "$CHANGES" ] || CHANGES="Release ${VERSION} (Node-RED ${NODERED_VERSION})"

          # cumulative catalog: start from the previous release's file so installed
          # instances keep finding their version; "cloudron versions add" merges the new entry
          if [ -n "$PREV_TAG" ] && gh release download "$PREV_TAG" --pattern CloudronVersions.json --output CloudronVersions.json --clobber 2>/dev/null; then
            echo "Merging into catalog from $PREV_TAG"
          else
            echo "No previous catalog, starting fresh"
            echo '{"stable": true, "versions": {}}' > CloudronVersions.json
          fi

          # inject tag version, upstream version and changelog into the manifest at
          # release time (not committed) so the CLI records them in the entry
          tmp="$(mktemp)"
          jq --arg v "$VERSION" --arg u "$NODERED_VERSION" --arg c "$CHANGES" \
            '.version = $v | .upstreamVersion = $u | .changelog = $c' \
            CloudronManifest.json > "$tmp" && mv "$tmp" CloudronManifest.json

          cloudron versions add --image "$IMAGE" --state published
          cloudron versions verify

          gh release create "$GITHUB_REF_NAME" CloudronVersions.json \
            --title "Node-RED for Cloudron ${VERSION}" \
            --notes "${CHANGES}"
